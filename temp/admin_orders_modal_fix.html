{#
  ══════════════════════════════════════════════════════════════════════
  REPLACEMENT SNIPPET for admin_orders.html
  ══════════════════════════════════════════════════════════════════════

  1. ADD this CSS block inside your <style> tag (or base.html global CSS).
     It defines .fp-invoice-table — the shared invoice style used by
     both user_orders.html and admin_orders.html modals.
     (If you already added it via user_orders_extra_scripts.html, skip.)

  2. REPLACE the openItemsModal() function in admin_orders.html's <script>
     block with the version below.

  ══════════════════════════════════════════════════════════════════════
#}

{# ── PART 1: ADD TO <style> BLOCK ── #}
<style>
/* ── Shared Invoice Modal Table (mirrors Invoice Preview exactly) ──
   Used by openItemsModal() in both user_orders.html and admin_orders.html.
   Add to base.html or to each file's <style> block. */
.fp-invoice-table {
    width: 100%;
    border-collapse: collapse;
}
.fp-invoice-table thead tr {
    background: var(--accent, #007acc);
}
.fp-invoice-table thead th {
    padding: 9px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.fp-invoice-table thead th:not(:first-child) { text-align: right; }
.fp-invoice-table tbody tr:nth-child(even) { background: var(--bg-elevated); }
.fp-invoice-table tbody tr:nth-child(odd)  { background: var(--bg-surface);  }
.fp-invoice-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.85rem;
    color: var(--text-bright);
    vertical-align: middle;
}
.fp-invoice-table tbody td:not(:first-child) { text-align: right; }
.fp-invoice-table tfoot td {
    padding: 10px 12px;
    border-top: 2px solid var(--border-color);
    font-size: 0.88rem;
}
.fp-invoice-badge-free {
    display: inline-block;
    font-size: 0.62rem; font-weight: 700;
    color: #28a745;
    background: rgba(40,167,69,0.12);
    border: 1px solid rgba(40,167,69,0.3);
    border-radius: 3px;
    padding: 1px 5px; margin-left: 5px;
    vertical-align: middle; line-height: 1.4;
}
</style>

{# ── PART 2: REPLACE openItemsModal() in admin_orders.html's <script> ── #}
{% raw %}
/* ─── VIEW ITEMS MODAL (FIXED) ───────────────────────────────────────
   Exact mirror of Invoice Preview: PRODUCT | RATE | QTY | AMOUNT
   Uses fp-invoice-table CSS class for consistent styling.
   parseItems() is already correct in admin_orders.html — no change needed.
   ─────────────────────────────────────────────────────────────────── */
function openItemsModal(orderId, itemsString, total) {
    const items = parseItems(itemsString);   /* parseItems() already in admin_orders.html */

    const rows = items.length > 0
        ? items.map(it => `
            <tr>
                <td>
                    ${it.name}
                    ${it.isFree ? `<span class="fp-invoice-badge-free">FREE</span>` : ""}
                </td>
                <td style="font-family:var(--font-mono); color:var(--text-muted);">
                    ${it.isFree ? "&mdash;" : `₹${it.priceNum.toFixed(2)}/kg`}
                </td>
                <td style="font-family:var(--font-mono);">${it.qty}</td>
                <td style="font-family:var(--font-mono);
                           color:${it.isFree ? "var(--success)" : "var(--text-bright)"};">
                    ${it.isFree ? "₹0.00" : `₹${it.amount.toFixed(2)}`}
                </td>
            </tr>`).join("")
        : `<tr><td colspan="4"
                  style="text-align:center; color:var(--text-muted); padding:14px;">
               No items found.
           </td></tr>`;

    document.getElementById("itemsModalLabel").innerHTML =
        `<i class="bi bi-receipt me-2" style="color:var(--accent);"></i>Items — ${orderId}`;

    document.getElementById("itemsModalBody").innerHTML = `
        <div class="table-responsive">
            <table class="fp-invoice-table">
                <thead>
                    <tr>
                        <th style="width:40%; text-align:left;">Product</th>
                        <th style="width:20%;">Rate</th>
                        <th style="width:15%;">Qty</th>
                        <th style="width:25%;">Amount</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" style="text-align:right; color:var(--text-muted);
                                               font-size:0.82rem;">Grand Total</td>
                        <td style="text-align:right; color:var(--accent); font-weight:700;
                                   font-family:var(--font-mono); font-size:1rem;">
                            ₹${parseFloat(total).toFixed(2)}
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>`;

    new bootstrap.Modal(document.getElementById("itemsModal")).show();
}
{% endraw %}
