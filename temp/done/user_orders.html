{% extends "base.html" %}
{#
  user_orders.html — Fresh Picks: My Orders
  ==========================================
  Child template. All content lives inside {% block content %}.
  No <style> block — all classes are defined in dark-theme.css
  (see the companion "CSS Update Snippet" delivered alongside this file).

  Routes (hardcoded — no url_for):
    Return Home        → /user_home
    Continue Shopping  → /shop
    Logout             → /logout

  Data source:
    POST /api/get_user_orders
    Flask reads user_id from session; no body payload required.
    Response: { status: "ok", orders: [ <order>, … ] }

  Order schema (from order.c / app.py):
    order_id, total_amount, delivery_slot, status,
    timestamp, items_string
    items_string format: "veg_id:qty_g:price_at_order,…"

  Team: CodeCrafters | SDP-1
#}

{% block title %}My Orders — FreshPicks{% endblock %}

{% block content %}
<div class="container py-4">

    {# ══════════════════════════════════════════════════════════════
       PAGE HEADER
       ══════════════════════════════════════════════════════════════ #}
    <div class="uo-page-header fade-in mb-4">
        <div class="uo-page-header__left">
            <h2 class="uo-page-title">
                <i class="bi bi-box-seam me-2" style="color:var(--accent);"></i>
                My Orders
            </h2>
            <p class="uo-page-subtitle mb-0">
                Track all your past and current deliveries.
            </p>
        </div>
        <div class="uo-page-header__right">
            <a href="/shop" class="btn btn-primary btn-sm">
                <i class="bi bi-basket me-1"></i>Continue Shopping
            </a>
            <a href="/user_home" class="btn btn-outline btn-sm ms-2">
                <i class="bi bi-house me-1"></i>Home
            </a>
            <a href="/logout" class="btn btn-sm ms-2 uo-btn-logout">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        </div>
    </div>

    {# ══════════════════════════════════════════════════════════════
       ORDERS CONTAINER — JS populates this section
       ══════════════════════════════════════════════════════════════ #}
    <div id="ordersContainer">

        {# Initial loading state #}
        <div class="uo-loading-state" id="loadingPlaceholder">
            <div class="spinner-border spinner-border-sm text-accent me-2"
                 role="status" aria-hidden="true"></div>
            <span class="text-muted">Loading your orders…</span>
        </div>

    </div>
    {# end #ordersContainer #}

</div>
{% endblock %}


{% block extra_scripts %}
<script>
/*
 * ════════════════════════════════════════════════════════════════
 *  USER ORDERS — CLIENT-SIDE CONTROLLER
 *  ────────────────────────────────────────────────────────────
 *  Route  : /user_orders  (GET — renders this template)
 *  API    : POST /api/get_user_orders  (returns order list)
 *
 *  Rendering pipeline:
 *    loadUserOrders()
 *      └─ fetch POST /api/get_user_orders
 *           └─ forEach order → buildOrderCard(order)
 *                ├─ buildTrackerSteps(activeIndex)   [right column]
 *                └─ parseItemsToRows(items_string)   [expanded panel]
 * ════════════════════════════════════════════════════════════════
 */

/* ──────────────────────────────────────────────────────────────
   SECTION 1: STATUS META
   Maps every possible DB status string to visual properties.
   slotIndex drives the 3-step vertical tracker (0-based).
   ────────────────────────────────────────────────────────────── */
const STATUS_META = {
    "Order Placed": {
        art:        "📋",
        label:      "Order Placed",
        slotIndex:  0,
        headerCls:  "status-placed",
        badgeCls:   "badge-status-placed"
    },
    "Out for Delivery": {
        art:        "🛵",
        label:      "Out for Delivery",
        slotIndex:  1,
        headerCls:  "status-out-delivery",
        badgeCls:   "badge-status-out-delivery"
    },
    "Delivered": {
        art:        "✅",
        label:      "Delivered",
        slotIndex:  2,
        headerCls:  "status-delivered",
        badgeCls:   "badge-status-delivered"
    },
    "Cancelled": {
        art:        "❌",
        label:      "Cancelled",
        slotIndex:  -1,
        headerCls:  "",
        badgeCls:   "badge-status-cancelled"
    }
};

/* ──────────────────────────────────────────────────────────────
   SECTION 2: TRACKER STEP BUILDER
   Three fixed steps; each step receives a CSS class:
     i < active  → "done"   (filled blue dot + checkmark)
     i === active → "active" (pulsing ring)
     i > active  → ""       (grey outline dot)
   ────────────────────────────────────────────────────────────── */
const TRACKER_STEPS = [
    { icon: "bi-receipt",     label: "Order<br>Placed"     },
    { icon: "bi-bicycle",     label: "Out for<br>Delivery" },
    { icon: "bi-house-check", label: "Delivered"           }
];

function buildTrackerSteps(activeIndex) {
    return TRACKER_STEPS.map((step, i) => {
        let stepClass = "";
        if      (i < activeIndex)  stepClass = "done";
        else if (i === activeIndex) stepClass = "active";

        const iconInDot = (stepClass === "done")
            ? "bi-check-lg"
            : step.icon;

        return `
            <div class="tracker-step ${stepClass}">
                <div class="tracker-dot">
                    <i class="bi ${iconInDot}"></i>
                </div>
                <div class="tracker-label">${step.label}</div>
            </div>`;
    }).join("");
}

/* ──────────────────────────────────────────────────────────────
   SECTION 3: ITEMS STRING PARSER
   DB format: "veg_id:qty_g:price_at_order,veg_id:qty_g:price_at_order"
   Produces a <table> of item rows with thumbnail images.

   Image path : /product_images/<veg_id>.jpeg
   Fallback   : onerror replaces broken <img> with the 🥬 emoji
                (spec-mandated exact pattern)
   ────────────────────────────────────────────────────────────── */
function parseItemsToRows(itemsString) {
    if (!itemsString || itemsString.trim() === "") {
        return `<span class="text-muted" style="font-size:0.82rem;">
                    No item details available.
                </span>`;
    }

    const entries = itemsString.split(",").filter(Boolean);

    const rows = entries.map(entry => {
        const [vegId, qtyG, priceRaw] = entry.split(":");
        const price   = parseFloat(priceRaw || "0");
        const isFree  = price === 0;
        const qty     = parseInt(qtyG, 10);

        /* Human-readable display name derived from veg_id.
           The backend may later enrich this; for now format the ID. */
        const displayName = vegId;

        const priceCell = isFree
            ? `<span class="item-free">🎁 Free</span>`
            : `<span class="item-price">₹${price.toFixed(2)}</span>`;

        return `
            <tr class="uo-item-row">
                <td class="uo-item-thumb-cell">
                    <div class="uo-item-thumb-wrap">
                        <img
                            src="/product_images/${vegId}.jpeg"
                            alt="${displayName}"
                            class="uo-item-thumb"
                            onerror="this.onerror=null; this.parentNode.innerHTML='🥬';"
                        >
                    </div>
                </td>
                <td class="uo-item-name">${displayName}</td>
                <td class="uo-item-qty">${qty} g</td>
                <td class="uo-item-price-cell">${priceCell}</td>
            </tr>`;
    }).join("");

    return `
        <table class="uo-items-table">
            <thead>
                <tr>
                    <th></th>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

/* ──────────────────────────────────────────────────────────────
   SECTION 4: SLOT BADGE HELPER
   Returns the CSS class for the delivery-slot pill.
   ────────────────────────────────────────────────────────────── */
function slotClass(slot) {
    const map = {
        "Morning":   "slot-morning",
        "Afternoon": "slot-afternoon",
        "Evening":   "slot-evening"
    };
    return map[slot] || "slot-evening";
}

/* ──────────────────────────────────────────────────────────────
   SECTION 5: BUILD SINGLE ORDER CARD
   ────────────────────────────────────────────────────────────
   order fields used:
     order_id, total_amount, delivery_slot,
     status, timestamp, items_string
   ────────────────────────────────────────────────────────────── */
function buildOrderCard(order) {
    const meta        = STATUS_META[order.status] || STATUS_META["Order Placed"];
    const activeIndex = meta.slotIndex;
    const collapseId  = `items-${order.order_id.replace(/\W/g, "_")}`;

    /* Chip-style summary items for the collapsed header area */
    const chipSummary = (() => {
        if (!order.items_string) return "";
        return order.items_string.split(",").filter(Boolean).slice(0, 3)
            .map(e => {
                const [vid, qty] = e.split(":");
                return `<span class="item-chip">${vid} · ${qty}g</span>`;
            }).join("") +
            (order.items_string.split(",").length > 3
                ? `<span class="item-chip" style="color:var(--text-muted);">…</span>`
                : "");
    })();

    const card = document.createElement("div");
    card.className = "order-track-card order-card fade-in";

    card.innerHTML = `
        <!-- ── Card Header ── -->
        <div class="order-track-header ${meta.headerCls}">
            <span class="d-flex align-items-center gap-2">
                <span class="status-dot"></span>
                <strong class="text-bright"
                        style="font-family:var(--font-mono); font-size:0.9rem;">
                    ${order.order_id}
                </strong>
                <span class="badge rounded-pill ${meta.badgeCls}">
                    ${meta.label}
                </span>
            </span>
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="badge rounded-pill ${slotClass(order.delivery_slot)}">
                    <i class="bi bi-clock me-1"></i>${order.delivery_slot || "—"}
                </span>
                <span class="order-timestamp">${order.timestamp || ""}</span>
                <button
                    class="uo-expand-btn"
                    type="button"
                    aria-expanded="false"
                    aria-controls="${collapseId}"
                    onclick="toggleItems(this, '${collapseId}')">
                    <i class="bi bi-chevron-down"></i>
                </button>
            </div>
        </div>

        <!-- ── Three-Column Body ── -->
        <div class="order-track-body">

            <!-- LEFT: status illustration -->
            <div class="track-left">
                <span class="status-art">${meta.art}</span>
                <span class="status-label">${meta.label}</span>
            </div>

            <!-- MIDDLE: order details -->
            <div class="track-middle">

                <!-- Items summary chips -->
                <div class="detail-row">
                    <i class="bi bi-bag detail-icon"></i>
                    <div>
                        <div class="detail-label">Items</div>
                        <div class="items-list mt-1">${chipSummary}</div>
                    </div>
                </div>

                <!-- Grand Total -->
                <div class="detail-row">
                    <i class="bi bi-currency-rupee detail-icon"></i>
                    <div>
                        <div class="detail-label">Grand Total</div>
                        <div class="order-total">
                            ₹${parseFloat(order.total_amount || 0).toFixed(2)}
                        </div>
                    </div>
                </div>

                <!-- Expanded item detail table -->
                <div class="uo-items-panel" id="${collapseId}" hidden>
                    <div class="uo-items-panel__inner">
                        <div class="detail-label mb-2">
                            <i class="bi bi-list-ul me-1"></i>Order Breakdown
                        </div>
                        ${parseItemsToRows(order.items_string)}
                    </div>
                </div>

            </div>
            <!-- end track-middle -->

            <!-- RIGHT: vertical graphical tracker -->
            <div class="track-right">
                ${buildTrackerSteps(activeIndex)}
            </div>

        </div>
        <!-- end order-track-body -->
    `;

    return card;
}

/* ──────────────────────────────────────────────────────────────
   SECTION 6: EXPAND / COLLAPSE ITEM DETAIL PANEL
   Toggles the hidden attribute on the items panel and
   rotates the chevron icon.
   ────────────────────────────────────────────────────────────── */
function toggleItems(btn, panelId) {
    const panel   = document.getElementById(panelId);
    const isOpen  = !panel.hidden;

    panel.hidden  = isOpen;
    btn.setAttribute("aria-expanded", String(!isOpen));

    const icon = btn.querySelector("i");
    icon.classList.toggle("uo-chevron-open", !isOpen);
}

/* ──────────────────────────────────────────────────────────────
   SECTION 7: EMPTY STATE BUILDER
   Shown when the API returns zero orders.
   "Continue Shopping" → /shop  (hardcoded, no url_for)
   ────────────────────────────────────────────────────────────── */
function renderEmptyState(container) {
    container.innerHTML = `
        <div class="uo-empty-state">
            <div class="uo-empty-state__icon">📦</div>
            <h4 class="uo-empty-state__title">No orders yet</h4>
            <p class="uo-empty-state__msg text-muted">
                Looks like you haven't placed any orders.<br>
                Head over to the shop and grab something fresh!
            </p>
            <a href="/shop" class="btn btn-primary mt-3">
                <i class="bi bi-basket me-2"></i>Start Shopping
            </a>
        </div>`;
}

/* ──────────────────────────────────────────────────────────────
   SECTION 8: ERROR STATE BUILDER
   ────────────────────────────────────────────────────────────── */
function renderError(container) {
    container.innerHTML = `
        <div class="alert" role="alert"
             style="background:rgba(244,71,71,0.08);
                    border:1px solid var(--danger);
                    color:var(--danger);
                    border-radius:var(--radius-lg);
                    padding:1rem 1.25rem;">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Could not load your orders. Please refresh the page.
            <button class="btn btn-sm ms-3"
                    style="border:1px solid var(--danger);
                           color:var(--danger);
                           background:transparent;"
                    onclick="location.reload()">
                Retry
            </button>
        </div>`;
}

/* ──────────────────────────────────────────────────────────────
   SECTION 9: FETCH USER ORDERS + RENDER
   ────────────────────────────────────────────────────────────
   Route   : POST /api/get_user_orders
   Payload : {} (Flask reads user_id from session)
   Response: { status: "ok", orders: [ <order>, … ] }

   Orders are displayed newest-first (array reversed before render).
   ────────────────────────────────────────────────────────────── */
async function loadUserOrders() {
    const container = document.getElementById("ordersContainer");

    try {
        const res = await fetch("/api/get_user_orders", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    "{}"   /* user_id is resolved server-side from session */
        });

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        /* Remove the loading spinner */
        document.getElementById("loadingPlaceholder")?.remove();

        if (!data.orders || data.orders.length === 0) {
            renderEmptyState(container);
            return;
        }

        /* Newest orders first */
        const ordered = [...data.orders].reverse();
        const frag    = document.createDocumentFragment();
        ordered.forEach(order => frag.appendChild(buildOrderCard(order)));
        container.appendChild(frag);

    } catch (err) {
        console.error("[FreshPicks] Failed to load orders:", err);
        document.getElementById("loadingPlaceholder")?.remove();
        renderError(container);
    }
}

/* ── Init ── */
document.addEventListener("DOMContentLoaded", loadUserOrders);
</script>
{% endblock %}
