    4. Agent: renders order.boy_name + order.boy_phone from the
       enriched API response (after cmd_get_orders fix in order.c).

{% block extra_scripts %}
<style>
/* ═══════════════════════════════════════════════════════════
   USER ORDER CARD STYLES
   ═══════════════════════════════════════════════════════════ */

.order-track-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    margin-bottom: 1.25rem;
    overflow: hidden;
    transition: box-shadow var(--transition);
}
.order-track-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

.order-track-header {
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-color);
    padding: 0.75rem 1.25rem;
    display: flex; align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 0.5rem;
}

.order-track-body {
    display: grid;
    grid-template-columns: 110px 1fr 160px;
    align-items: stretch;
}
@media (max-width: 640px) {
    .order-track-body { grid-template-columns: 1fr; }
    .track-right {
        border-left: none !important;
        border-top: 1px solid var(--border-color);
        flex-direction: row !important;
        justify-content: center !important;
        gap: 1.5rem !important;
    }
}

.track-left {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.25rem 0.75rem;
    border-right: 1px solid var(--border-color);
    gap: 0.4rem;
}
.track-left .status-art  { font-size: 2.5rem; line-height: 1; }
.track-left .status-label {
    font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.07em; text-align: center;
    color: var(--text-muted);
}

.track-middle { padding: 1.25rem 1.5rem; }
.track-middle .detail-row {
    display: flex; align-items: flex-start;
    margin-bottom: 0.6rem; gap: 0.5rem;
}
.track-middle .detail-icon {
    color: var(--accent); font-size: 0.85rem;
    margin-top: 2px; flex-shrink: 0;
}
.track-middle .detail-label {
    font-size: 0.7rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
}
.track-middle .detail-value { font-size: 0.88rem; color: var(--text-bright); }

.track-right {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem 1rem;
    border-left: 1px solid var(--border-color);
    gap: 0;
}

/* ── Vertical tracker ── */
.tracker-step {
    display: flex; flex-direction: column;
    align-items: center; position: relative; width: 100%;
}
.tracker-step:not(:last-child)::after {
    content: ""; width: 2px; height: 28px;
    background: var(--border-color); margin: 2px 0;
    transition: background 0.4s ease;
}
.tracker-step.done:not(:last-child)::after { background: var(--accent); }

.tracker-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border-color);
    background: var(--bg-primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; transition: all 0.3s ease;
    position: relative; z-index: 1;
}

/* Done state: accent fill with white icon */
.tracker-step.done .tracker-dot {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
}

/* ── FIX: "Delivered" final step when fully done — green glow + checkmark ──
   The checkmark icon (bi-check-lg) is injected by buildTracker() in JS.
   This CSS class applies the green colour and glow ring. */
.tracker-step.done.step-delivered .tracker-dot {
    background: #28a745 !important;
    border-color: #28a745 !important;
    color: #ffffff !important;
    box-shadow: 0 0 0 5px rgba(40,167,69,0.25) !important;
}

/* Active: pulsing ring */
.tracker-step.active .tracker-dot {
    background: var(--bg-elevated); border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,122,204,0.2);
    animation: pulseDot 1.5s infinite;
}
@keyframes pulseDot {
    0%   { box-shadow: 0 0 0 0   rgba(0,122,204,0.4); }
    70%  { box-shadow: 0 0 0 8px rgba(0,122,204,0); }
    100% { box-shadow: 0 0 0 0   rgba(0,122,204,0); }
}

.tracker-label {
    font-size: 0.60rem; text-align: center;
    color: var(--text-muted); margin-top: 3px; max-width: 70px;
}

/* Card footer actions */
.order-track-footer {
    background: var(--bg-elevated);
    border-top: 1px solid var(--border-color);
    padding: 0.6rem 1rem;
    display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
}

/* ── Modal invoice table: exact mirror of Invoice Preview ── */
.fp-invoice-table {
    width: 100%;
    border-collapse: collapse;
}
.fp-invoice-table thead tr {
    background: var(--accent, #007acc);
}
.fp-invoice-table thead th {
    padding: 9px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.fp-invoice-table tbody tr:nth-child(even) {
    background: var(--bg-elevated);
}
.fp-invoice-table tbody tr:nth-child(odd) {
    background: var(--bg-surface);
}
.fp-invoice-table tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-color);
    font-size: 0.85rem;
    color: var(--text-bright);
    vertical-align: middle;
}
.fp-invoice-table tfoot td {
    padding: 10px 12px;
    border-top: 2px solid var(--border-color);
    font-size: 0.88rem;
}
.fp-invoice-badge-free {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    color: #28a745;
    background: rgba(40,167,69,0.12);
    border: 1px solid rgba(40,167,69,0.3);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 5px;
    vertical-align: middle;
    line-height: 1.4;

</style>

<script>
/* ════════════════════════════════════════════════════════════════════════
   USER ORDERS CONTROLLER
   ════════════════════════════════════════════════════════════════════════ */

const STATUS_META = {
    "Order Placed": {
        art: "🛒", label: "Order Placed", slotIndex: 0,
        badgeStyle: "color:#9cdcfe; background:rgba(0,122,204,0.15); border:1px solid rgba(0,122,204,0.3);"
    },
    "Out for Delivery": {
        art: "🛵", label: "Out for Delivery", slotIndex: 1,
        badgeStyle: "color:#ffc107; background:rgba(255,193,7,0.15); border:1px solid rgba(255,193,7,0.3);"
    },
    "Delivered": {
        art: "✅", label: "Delivered", slotIndex: 2,
        badgeStyle: "color:#28a745; background:rgba(40,167,69,0.15); border:1px solid rgba(40,167,69,0.3);"
    },
    "Cancelled": {
        art: "❌", label: "Cancelled", slotIndex: -1,
        badgeStyle: "color:#dc3545; background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.3);"
    }
};

const TRACKER_STEPS = [
    { icon: "bi-receipt",     label: "Order\nPlaced"     },
    { icon: "bi-bicycle",     label: "Out for\nDelivery" },
    { icon: "bi-house-check", label: "Delivered"          }
];

let _pendingUserCancelId = null;

{% raw %}
/* ────────────────────────────────────────────────────────────────────
   buildTracker(activeIndex)
   activeIndex: 0=Order Placed, 1=Out for Delivery, 2=Delivered, -1=Cancelled

   FIX: steps that are "done" get bi-check-lg icon.
        The final step (i===2) when done also gets step-delivered class
        which triggers the green glow via CSS.
   ────────────────────────────────────────────────────────────────────  */
function buildTracker(activeIndex) {
    return TRACKER_STEPS.map((step, i) => {
        let stepClass = "";
        if      (i < activeIndex)  stepClass = "done";
        else if (i === activeIndex) stepClass = "active";

        /* Final "Delivered" step (index 2) — add green-glow class */
        if (i === 2 && stepClass === "done") {
            stepClass += " step-delivered";
        }

        /* Icon logic:
           - done  → checkmark (bi-check-lg)  ← THE FIX
           - active / pending → step's own icon */
        const iconClass = stepClass.includes("done") ? "bi-check-lg" : step.icon;

        return `
            <div class="tracker-step ${stepClass}">
                <div class="tracker-dot">
                    <i class="bi ${iconClass}"></i>
                </div>
                <div class="tracker-label">${step.label.replace("\n", "<br>")}</div>
            </div>`;
    }).join("");
}

/* ────────────────────────────────────────────────────────────────────
   parseItemsInvoice(itemsString)
   Handles:
     4-part (current): veg_id:name:qty_g:price_per_1000g  ← shows name
     3-part (legacy):  veg_id:qty_g:price_per_1000g       ← shows id
   ────────────────────────────────────────────────────────────────────  */
function parseItemsInvoice(itemsString) {
    if (!itemsString || !itemsString.trim()) return [];
    return itemsString.split(",").filter(Boolean).map(entry => {
        const parts = entry.trim().split(":");
        let id, name, qty, price;
        if (parts.length >= 4) {
            [id, name, qty, price] = parts;
        } else if (parts.length === 3) {
            [id, qty, price] = parts;
            name = id;   /* legacy: show id until re-ordered */
        } else {
            return null;
        }
        const qtyNum   = parseInt(qty)    || 0;
        const priceNum = parseFloat(price) || 0;
        const isFree   = priceNum === 0;
        const qtyLabel = qtyNum >= 1000
            ? `${(qtyNum / 1000).toFixed(2)} kg`
            : `${qtyNum} g`;
        const amount = isFree ? 0 : (qtyNum / 1000) * priceNum;
        return { id, name: name || id, qty: qtyLabel, priceNum, amount, isFree };
    }).filter(Boolean);
}

/* ────────────────────────────────────────────────────────────────────
   openUserItemsModal(orderId, itemsString, total)
   Table structure mirrors the Invoice Preview exactly:
   PRODUCT | RATE | QTY | AMOUNT
   ────────────────────────────────────────────────────────────────────  */
function openUserItemsModal(orderId, itemsString, total) {
    const items = parseItemsInvoice(itemsString);

    const rows = items.length > 0
        ? items.map(it => `
            <tr>
                <td>
                    ${it.name}
                    ${it.isFree ? `<span class="fp-invoice-badge-free">FREE</span>` : ""}
                </td>
                <td class="text-end" style="color:var(--text-muted); font-family:var(--font-mono);">
                    ${it.isFree ? "&mdash;" : `₹${it.priceNum.toFixed(2)}/kg`}
                </td>
                <td class="text-end" style="font-family:var(--font-mono);">${it.qty}</td>
                <td class="text-end"
                    style="font-family:var(--font-mono);
                           color:${it.isFree ? "var(--success)" : "var(--text-bright)"};">
                    ${it.isFree ? "₹0.00" : `₹${it.amount.toFixed(2)}`}
                </td>
            </tr>`).join("")
        : `<tr><td colspan="4" class="text-center text-muted py-3">No items found.</td></tr>`;

    /* Update modal title */
    document.getElementById("userItemsModalLabel").innerHTML =
        `<i class="bi bi-receipt me-2" style="color:var(--accent);"></i>Items — ${orderId}`;

    /* Inject table */
    document.getElementById("userItemsModalBody").innerHTML = `
        <div class="table-responsive">
            <table class="fp-invoice-table">
                <thead>
                    <tr>
                        <th style="width:40%; text-align:left;">Product</th>
                        <th style="width:20%; text-align:right;">Rate</th>
                        <th style="width:15%; text-align:right;">Qty</th>
                        <th style="width:25%; text-align:right;">Amount</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
                <tfoot>
                    <tr>
                        <td colspan="3" class="text-end text-muted"
                            style="font-size:0.82rem;">Grand Total</td>
                        <td class="text-end"
                            style="color:var(--accent); font-weight:700;
                                   font-family:var(--font-mono);">
                            ₹${parseFloat(total).toFixed(2)}
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>`;

    new bootstrap.Modal(document.getElementById("userItemsModal")).show();
}

/* ────────────────────────────────────────────────────────────────────
   Cancel flow — visible ONLY when status === "Order Placed"
   Step 1: confirm() with ₹50 disclaimer
   Step 2: OTP modal (demo OTP: 0000)
   Step 3: POST /api/cancel_order
   ────────────────────────────────────────────────────────────────────  */
function initiateCancelOrder(orderId) {
    _pendingUserCancelId = orderId;

    const proceed = confirm(
        `⚠ Cancel Order ${orderId}?\n\n` +
        `A cancellation fee of ₹50 will be deducted.\n` +
        `The remaining balance will be refunded within 2–3 working days.\n\n` +
        `Proceed to enter cancellation OTP?`
    );
    if (!proceed) { _pendingUserCancelId = null; return; }

    const otpInput = document.getElementById("userOtpInput");
    const otpError = document.getElementById("userOtpError");
    if (otpInput) otpInput.value = "";
    if (otpError) otpError.style.display = "none";

    new bootstrap.Modal(document.getElementById("userOtpModal")).show();
}

async function confirmUserCancelWithOtp() {
    const otpInput = document.getElementById("userOtpInput");
    const otpError = document.getElementById("userOtpError");
    const otp = otpInput ? otpInput.value.trim() : "";

    if (otp !== "0000") {
        if (otpError) otpError.style.display = "block";
        return;
    }
    if (otpError) otpError.style.display = "none";

    const orderId = _pendingUserCancelId;
    if (!orderId) return;

    bootstrap.Modal.getInstance(document.getElementById("userOtpModal"))?.hide();

    try {
        const res  = await fetch("/api/cancel_order", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ order_id: orderId })
        });
        const data = await res.json();

        if (data.status === "SUCCESS") {
            const cardEl = document.getElementById(`user-card-${orderId}`);
            if (cardEl) {
                const artEl   = cardEl.querySelector(".status-art");
                const labelEl = cardEl.querySelector(".status-label");
                if (artEl)   artEl.textContent  = "❌";
                if (labelEl) labelEl.textContent = "Cancelled";

                const badge = cardEl.querySelector(".order-status-badge");
                if (badge) {
                    badge.textContent = "Cancelled";
                    badge.setAttribute("style",
                        "color:#dc3545; background:rgba(220,53,69,0.15); border:1px solid rgba(220,53,69,0.3);");
                }

                const cancelBtn = cardEl.querySelector(".btn-user-cancel");
                if (cancelBtn) cancelBtn.style.display = "none";

                const trackerEl = cardEl.querySelector(".track-right");
                if (trackerEl) trackerEl.innerHTML =
                    `<span style="color:#dc3545; font-size:0.8rem; text-align:center;">
                        <i class="bi bi-x-circle mb-1" style="font-size:1.4rem;"></i><br>Cancelled
                     </span>`;
            }
        } else {
            alert(`Cancel failed: ${data.message}`);
        }
    } catch (err) {
        console.error(err);
        alert("Network error. Please try again.");
    }

    _pendingUserCancelId = null;
}

/* ────────────────────────────────────────────────────────────────────
   buildOrderCard(order)
   order shape (from /api/get_user_orders after the C-backend fix):
   {
     order_id, user_id, total_amount, delivery_slot,
     delivery_boy_id, status, timestamp, items_string,
     boy_name, boy_phone   ← now present after cmd_get_orders fix
   }
   ────────────────────────────────────────────────────────────────────  */
function buildOrderCard(order) {
    const meta       = STATUS_META[order.status] || STATUS_META["Order Placed"];
    const activeIndex = meta.slotIndex;

    const slotColors = {
        "Morning":   "color:#4EC9B0; background:rgba(78,201,176,0.12);  border:1px solid rgba(78,201,176,0.25);",
        "Afternoon": "color:#1F8AD2; background:rgba(0,122,204,0.12);   border:1px solid rgba(0,122,204,0.25);",
        "Evening":   "color:#CE9178; background:rgba(206,145,120,0.12); border:1px solid rgba(206,145,120,0.25);"
    };
    const slotStyle  = slotColors[order.delivery_slot] || slotColors["Evening"];
    const canCancel  = order.status === "Order Placed";

    /* Delivery agent display: show name+phone if available, else ID */
    const agentDisplay = order.boy_name && order.boy_name !== "Unknown"
        ? `${order.boy_name}${order.boy_phone && order.boy_phone !== "N/A"
            ? `<span class="text-muted ms-2" style="font-size:0.80rem;">📞 ${order.boy_phone}</span>`
            : ""}`
        : (order.delivery_boy_id || "Unassigned");

    const card = document.createElement("div");
    card.className = "order-track-card fade-in";
    card.id        = `user-card-${order.order_id}`;

    card.innerHTML = `
        <!-- Card Header -->
        <div class="order-track-header">
            <span>
                <strong class="text-bright"
                        style="font-family:var(--font-mono);">${order.order_id}</strong>
                <span class="badge ms-2 order-status-badge"
                      style="${meta.badgeStyle}">${meta.label}</span>
            </span>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <span class="badge" style="${slotStyle}">
                    <i class="bi bi-clock me-1"></i>${order.delivery_slot}
                </span>
                <span style="font-size:0.78rem; color:var(--text-muted);
                             font-family:var(--font-mono);">
                    ${order.timestamp || ""}
                </span>
            </div>
        </div>

        <!-- Three-Column Body -->
        <div class="order-track-body">

            <!-- LEFT: Status Art -->
            <div class="track-left">
                <span class="status-art">${meta.art}</span>
                <span class="status-label">${meta.label}</span>
            </div>

            <!-- MIDDLE: Details -->
            <div class="track-middle">

                <!-- Delivery Agent: actual name + phone -->
                <div class="detail-row">
                    <i class="bi bi-bicycle detail-icon"></i>
                    <div>
                        <div class="detail-label">Delivery Agent</div>
                        <div class="detail-value">${agentDisplay}</div>
                    </div>
                </div>

                <!-- Grand Total -->
                <div class="detail-row">
                    <i class="bi bi-currency-rupee detail-icon"></i>
                    <div>
                        <div class="detail-label">Grand Total</div>
                        <div class="detail-value"
                             style="font-size:1.05rem; font-weight:700;
                                    color:var(--success);">
                            ₹${parseFloat(order.total_amount).toFixed(2)}
                        </div>
                    </div>
                </div>

            </div>

            <!-- RIGHT: Vertical Tracker — checkmark on done nodes -->
            <div class="track-right">
                ${buildTracker(activeIndex)}
            </div>

        </div>

        <!-- Footer actions -->
        <div class="order-track-footer">

            <!-- View Items -->
            <button class="btn btn-sm btn-action"
                    style="background:var(--bg-elevated); color:var(--text-bright);
                           border:1px solid var(--border-color);"
                    onclick="openUserItemsModal(
                        '${order.order_id}',
                        '${(order.items_string || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'")}',
                        '${order.total_amount}')">
                <i class="bi bi-list-ul me-1"></i>View Items
            </button>

            <!-- Download Receipt -->
            <button class="btn btn-sm btn-action"
                    style="background:var(--accent); color:#fff; border:none;"
                    onclick="generateStandardReceiptPDF({
                        orderId:      '${order.order_id}',
                        userId:       '${order.user_id}',
                        date:         '${(order.timestamp || '').slice(0,10)}',
                        timestamp:    '${order.timestamp || ''}',
                        status:       '${order.status}',
                        deliverySlot: '${order.delivery_slot}',
                        total:        ${parseFloat(order.total_amount)},
                        itemsString:  '${(order.items_string || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'")}',
                        boyName:      '${(order.boy_name  || "").replace(/'/g, "\\'")}',
                        boyPhone:     '${(order.boy_phone || "").replace(/'/g, "\\'")}'
                    })">
                <i class="bi bi-download me-1"></i>Receipt
            </button>

            <!-- Cancel — ONLY for "Order Placed" -->
            ${canCancel ? `
            <button class="btn btn-sm btn-user-cancel"
                    style="background:var(--danger); color:#fff; border:none;
                           border-radius:4px; padding:0.25rem 0.75rem;
                           font-size:0.8rem;"
                    onclick="initiateCancelOrder('${order.order_id}')">
                <i class="bi bi-x-circle me-1"></i>Cancel Order
            </button>` : ""}

        </div>`;

    return card;
}

/* ────────────────────────────────────────────────────────────────────
   loadUserOrders — fetches from /api/get_user_orders and renders cards
   ────────────────────────────────────────────────────────────────────  */
async function loadUserOrders() {
    try {
        const res  = await fetch("/api/get_user_orders", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    "{}"
        });
        const data = await res.json();

        document.getElementById("loadingPlaceholder")?.remove();
        const container = document.getElementById("ordersContainer");

        if (!data.orders || data.orders.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <span style="font-size:3rem;">📦</span>
                    <p class="text-muted mt-3">
                        You haven't placed any orders yet.
                        <a href="/shop">Browse products →</a>
                    </p>
                </div>`;
            return;
        }

        /* Newest first */
        [...data.orders].reverse().forEach(order =>
            container.appendChild(buildOrderCard(order))
        );

    } catch (err) {
        console.error("loadUserOrders error:", err);
        document.getElementById("ordersContainer").innerHTML = `
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-circle me-2"></i>
                Could not load orders. Please refresh.
            </div>`;
    }
}
{% endraw %}

document.addEventListener("DOMContentLoaded", loadUserOrders);
</script>
{% endblock %}
