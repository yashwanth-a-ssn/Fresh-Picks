<!DOCTYPE html>

<!--
{#
  base.html - Fresh Picks: Master Layout Template
  ================================================
  This is the parent template. ALL other HTML pages use
  this as their base using Jinja2's template inheritance.

  HOW IT WORKS (Jinja2 Template Inheritance):
    - This file defines the shared navbar, footer, CSS, and JS
    - Child pages (login.html, profile.html, etc.) extend this file
    - Child pages only need to fill in the {% block content %} section

  HOW TO USE IN A CHILD TEMPLATE:
    {% extends "base.html" %}
    {% block title %}My Page Title{% endblock %}

    {% block content %} 
        => Your page's unique content goes here 
    {% endblock %}

  Team: CodeCrafters | Project: Fresh Picks | SDP-1
#}
-->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Dynamic page title: child templates can override this -->
    <title>{% block title %}Fresh Picks{% endblock %} | Fresh Picks</title>

    <!-- Bootstrap 5 CSS (from CDN — no install needed) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons (for hamburger, profile icons, etc.) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Our custom dark theme - must come AFTER Bootstrap to override it -->
    <link rel="stylesheet" href="/static/css/dark-theme.css">

    <!-- Any extra <style> or <link> a child page needs -->
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- ═══════════════════════════════════════════════
         NAVBAR - Consistent across all pages
         ═══════════════════════════════════════════════ -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">

            <!-- Brand Logo / App Name -->
            <a class="navbar-brand" href="/">
                <i class="bi bi-basket2-fill me-2" style="color: var(--accent);"></i>
                Fresh<span class="brand-dot">Picks</span>
            </a>

            <!-- Hamburger button (shown on small screens) -->
            <!--
                data-bs-toggle="collapse" and data-bs-target tell Bootstrap
                which element to show/hide when this button is clicked.
            -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar"
                    aria-controls="mainNavbar"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav links (collapse to hamburger on mobile) -->
            <div class="collapse navbar-collapse" id="mainNavbar">

                <!-- Left-aligned links -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house me-1"></i>Home
                        </a>
                    </li>
                </ul>

                <!-- Right-aligned links -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                    <!-- Show these links only when NOT logged in -->
                    <!-- We use a simple inline check via JS (see script below) -->
                    <li class="nav-item" id="nav-login-btn">
                        <a class="nav-link" href="/login?role=user">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Login
                        </a>
                    </li>
                    <li class="nav-item" id="nav-register-btn">
                        <a class="nav-link" href="/register">
                            <i class="bi bi-person-plus me-1"></i>Register
                        </a>
                    </li>

                    <!-- Show these only when logged in -->
                    <li class="nav-item d-none" id="nav-profile-btn">
                        <a class="nav-link" href="/profile">
                            <i class="bi bi-person-circle me-1"></i>Profile
                        </a>
                    </li>
                    <li class="nav-item d-none" id="nav-logout-btn">
                        <a class="nav-link" href="/logout">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <!-- End Navbar -->


    <!-- ═══════════════════════════════════════════════
         MAIN CONTENT AREA
         Child templates fill in this block.
         ═══════════════════════════════════════════════ -->
    <main class="fade-in">
        {% block content %}
        <!-- Child page content is injected here by Jinja2 -->
        {% endblock %}
    </main>
    <!-- End Main Content -->


    <!-- ═══════════════════════════════════════════════
         FOOTER - Consistent across all pages
         ═══════════════════════════════════════════════ -->
    <footer>
        <div class="container">
            <p class="mb-1">
                <i class="bi bi-basket2-fill me-1" style="color: var(--accent);"></i>
                <strong class="text-bright">FreshPicks</strong>
                &nbsp;&mdash;&nbsp; A Fresh Take on Grocery Shopping
            </p>
            <p class="mb-0">
                &copy; 2026
                <a href="#" class="text-muted">CodeCrafters</a>.
                All rights reserved. | SDP-1 Project
            </p>
        </div>
    </footer>
    <!-- End Footer -->


    <!-- ═══════════════════════════════════════════════
         SCRIPTS
         Bootstrap JS (must be at end of body)
         ═══════════════════════════════════════════════ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /*
         * Navbar Session Awareness
         * ========================
         * PURPOSE: Show/hide Login, Register, Profile, Logout buttons
         *          in the navbar based on whether the user is logged in.
         *
         * HOW IT WORKS:
         *   When a user logs in, we store their user_id in localStorage.
         *   When they log out (via /logout), Flask clears the server session,
         *   and we also clear localStorage.
         *   On every page load, we check localStorage to update the navbar.
         */
        (function updateNavbar() {
            const userId = localStorage.getItem("user_id");
            const role   = localStorage.getItem("role");

            if (userId) {
                /* User is logged in: hide login/register, show profile/logout */
                document.getElementById("nav-login-btn").classList.add("d-none");
                document.getElementById("nav-register-btn").classList.add("d-none");
                document.getElementById("nav-logout-btn").classList.remove("d-none");

                /* Only show Profile link for regular users, not admin */
                if (role === "user") {
                    document.getElementById("nav-profile-btn").classList.remove("d-none");
                }
            }
        })();
    </script>

    <!-- Any extra scripts a child page needs -->
    {% block extra_scripts %}{% endblock %}

</body>
</html>
